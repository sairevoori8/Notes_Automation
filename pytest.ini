[pytest]

addopts = -v --alluredir=reports/allure-results
markers =
    smoke: Smoke tests
    regression: Regression tests
    sanity: Sanity tests
    ui: UI tests
    api: API tests
    e2e: End-to-end tests
    security: Security validation tests
    negative: Negative test scenarios
    ts: Test checklist tests

testpaths = tests
